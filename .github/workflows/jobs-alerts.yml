name: Skyler Jobs Radar

on:
  schedule:
    - cron: "0 12,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  jobs-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Skyler Jobs Radar
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DISCORD_WEBHOOK_SKYLER_JOBS: ${{ secrets.DISCORD_WEBHOOK_SKYLER_JOBS }}
        run: python -m src.jobs.radar_vagas

      - name: Commit seen jobs
        run: |
          git config user.name "skyler-bot"
          git config user.email "skyler-bot@users.noreply.github.com"
          git add data/seen_jobs.json
          git diff --cached --quiet || git commit -m "Update seen jobs"
          git push
